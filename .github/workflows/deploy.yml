name: 自动部署博客

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm ci

      - name: 生成静态文件
        run: npx hexo generate

      - name: 部署到 GitHub Pages（原生 Hexo 首页）
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: Bingsv/Bingsv.github.io
          publish_branch: main
          publish_dir: ./public
          cname: bi-ng.top

      - name: 部署到 ECS（自定义导航首页）
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cp source/custom-index.html public/index.html
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -r public/* ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:~/blog-static/
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} "cd ~/blog-compose && docker compose restart nginx"
