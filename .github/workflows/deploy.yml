name: 自动部署博客到 ECS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm ci

      - name: 生成静态文件
        run: npx hexo generate

      - name: 上传到 ECS 并重启 Nginx
        env:
          KEY: ${{ secrets.SSH_KEY }}
          HOST: ${{ secrets.ECS_HOST }}
          USER: ${{ secrets.ECS_USER }}
        run: |
          echo "$KEY" > deploy_key
          chmod 600 deploy_key
          scp -o StrictHostKeyChecking=no -i deploy_key -r public/* ${USER}@${HOST}:~/blog-static/
          ssh -o StrictHostKeyChecking=no -i deploy_key ${USER}@${HOST} "cd ~/blog-compose && docker compose restart nginx"
