name: 自动部署博客到 ECS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Hexo
        run: npm install

      - name: 生成静态文件
        run: npm run build

      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Host ecs
            HostName ${{ secrets.ECS_HOST }}
            User ${{ secrets.ECS_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no" > ~/.ssh/config

      - name: 上传到 ECS
        run: scp -r public/* ecs:~/blog-static/

      - name: 重启 Nginx
        run: ssh ecs "cd ~/blog-compose && docker compose restart nginx"
